# Runs ESLint + Prettier over the whole tree on every push and PR to main.
#
# The rule set in `eslint.config.js` runs every React-hooks check at its
# default `error` level (only `set-state-in-effect` stays disabled — see
# the config comment). ESLint itself fails on `error`-level findings, so a
# regression breaks CI immediately. Prettier is enforced via
# `npm run format:check` — reformatting on CI would silently rewrite files
# without the author noticing, so we fail the run instead.
name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch so a quick follow-up push does
# not queue behind a stale one.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        # `--legacy-peer-deps` is mandated by `CLAUDE.md` — React 19 vs. the
        # RN 0.81 tree still has unresolved peer conflicts.
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check
