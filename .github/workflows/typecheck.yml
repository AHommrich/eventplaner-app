# Runs the strict TypeScript compiler over the whole tree on every push and
# PR to main. Cheapest of the three gates and the most useful — any drift
# between a fetcher's declared shape and its consumers surfaces here first.
name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript
        run: npm run typecheck
